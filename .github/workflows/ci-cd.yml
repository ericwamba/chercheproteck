name: ci-cd

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Syntax checks
        run: npm run check

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy infrastructure (Bicep)
        run: |
          az deployment group create \
            --resource-group ${{ secrets.AZURE_RG }} \
            --template-file infra/main.bicep \
            --parameters appName=chercheprotek postgresAdmin=${{ secrets.PG_ADMIN }} postgresPassword=${{ secrets.PG_PASSWORD }}
      - name: Deploy App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: chercheprotek
          package: .

  post_deploy_smoke_test:
    runs-on: ubuntu-latest
    needs: deploy
    environment: production
    steps:
      - name: Health check
        run: |
          set -e
          APP_URL="https://chercheprotek.azurewebsites.net/api/health"
          for i in {1..10}; do
            STATUS=$(curl -s -o /tmp/health.json -w "%{http_code}" "$APP_URL" || true)
            if [ "$STATUS" = "200" ]; then
              cat /tmp/health.json
              exit 0
            fi
            echo "Attempt $i failed with status $STATUS; retrying in 10s"
            sleep 10
          done
          echo "Smoke test failed for $APP_URL"
          exit 1
